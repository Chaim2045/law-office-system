# ═══════════════════════════════════════════════════════════════
# Law Office Management System - Pull Request Validation
# ═══════════════════════════════════════════════════════════════
#
# תכונות:
# ✅ Fast feedback על Pull Requests
# ✅ בדיקות איכות קוד אוטומטיות
# ✅ TypeScript type checking
# ✅ Security scanning
# ✅ בדיקה שהבילד עובד
# ✅ ללא deployment (רק בדיקות)
#
# גרסה: 1.0.0
# תאריך: 2025-11-03
# ═══════════════════════════════════════════════════════════════

name: 🔍 Pull Request Validation

# ═══════════════════════════════════════════════════════════════
# Triggers - מתי ה-workflow רץ
# ═══════════════════════════════════════════════════════════════
on:
  pull_request:
    # רץ על כל PR שנפתח כנגד main
    branches: [main]
    # רץ גם על עדכונים ל-PR קיים
    types: [opened, synchronize, reopened]

  # ידני trigger למקרה שרוצים לרוץ שוב
  workflow_dispatch:

# ═══════════════════════════════════════════════════════════════
# Environment Variables - משתני סביבה
# ═══════════════════════════════════════════════════════════════
env:
  NODE_VERSION: '20'
  CACHE_KEY_PREFIX: 'law-office-v1'
  TZ: 'Asia/Jerusalem'

# ═══════════════════════════════════════════════════════════════
# Concurrency - ביטול runs ישנים כשיש PR עדכון
# ═══════════════════════════════════════════════════════════════
concurrency:
  # כל PR מקבל group משלו
  group: pr-${{ github.event.pull_request.number }}
  # ביטול runs ישנים אם יש push חדש ל-PR
  cancel-in-progress: true

jobs:
  # ═════════════════════════════════════════════════════════════
  # JOB 1: PR Information
  # מציג מידע על ה-PR
  # ═════════════════════════════════════════════════════════════
  pr-info:
    name: 📋 PR Information
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # PR-CI-1: PR fields (title, head ref, author, …) are USER-CONTROLLED and
      # must NOT be inlined as ${{ … }} into a run: shell. ${{ }} is substituted
      # into the script *source* before the shell parses it, so a title that
      # contains a double-quote breaks the step (this happened on PR #348 with a
      # gershayim ת"ז written as ") and a crafted title/branch is an arbitrary-
      # command injection vector. Pass each value through env: and reference it
      # as a quoted shell variable — the runner sets the env var to the literal
      # value and the shell never re-parses its contents as code.
      # Ref: GitHub Docs — "Understanding the risk of script injections".
      - name: 📊 Display PR Details
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_CHANGED_FILES: ${{ github.event.pull_request.changed_files }}
          PR_COMMITS: ${{ github.event.pull_request.commits }}
        run: |
          echo "════════════════════════════════════════"
          echo "📝 Pull Request Information"
          echo "════════════════════════════════════════"
          echo "PR Number: #${PR_NUMBER}"
          echo "Title: ${PR_TITLE}"
          echo "Author: ${PR_AUTHOR}"
          echo "Base Branch: ${PR_BASE_REF}"
          echo "Head Branch: ${PR_HEAD_REF}"
          echo "Changed Files: ${PR_CHANGED_FILES}"
          echo "Commits: ${PR_COMMITS}"
          echo "════════════════════════════════════════"

  # ═════════════════════════════════════════════════════════════
  # JOB 2: Code Quality & Linting
  # בדיקות איכות קוד
  # ═════════════════════════════════════════════════════════════
  code-quality:
    name: 🎨 Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout PR Code
        uses: actions/checkout@v7
        with:
          # Checkout the PR's head branch
          ref: ${{ github.event.pull_request.head.sha }}
          # Fetch full history for better diff analysis
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🎨 Lint CSS Files
        run: npm run css:lint

      # PR-META-6: Lint new TypeScript backend code in functions/src-ts/.
      # Existing JS in functions/ is intentionally NOT linted here — the
      # commonIgnores in eslint.config.js still applies, so this step is a
      # NO-OP if no .ts files exist under functions/src-ts/ yet.
      # 0 errors blocks merge; warnings are reported but don't fail the step.
      - name: 🟦 Lint functions/src-ts (PR-META-6)
        run: |
          if [ -d functions/src-ts ] && find functions/src-ts -name '*.ts' -not -path '*/node_modules/*' -print -quit | grep -q .; then
            echo "Linting functions/src-ts/ TypeScript files..."
            npx eslint 'functions/src-ts/**/*.ts'
          else
            echo "⏭️  Skipped — no .ts files in functions/src-ts/ yet."
          fi

      # PR-CI-1: base ref via env: (see JOB 1) — never inline a github.event.*
      # value into a shell command. The ref-range is quoted as a single arg.
      - name: 📊 Changed Files Statistics
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          echo "📊 Files Changed in This PR:"
          git diff --name-only "origin/${PR_BASE_REF}...HEAD" | head -20
          echo ""
          echo "Total files changed: $(git diff --name-only "origin/${PR_BASE_REF}...HEAD" | wc -l)"

      # PR-CI-1: base ref via env: (see JOB 1).
      - name: 🔍 Check for New TODOs
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          echo "🔍 Checking for new TODO comments..."
          NEW_TODOS=$(git diff "origin/${PR_BASE_REF}...HEAD" | grep -i "^+.*TODO\|^+.*FIXME\|^+.*XXX" | wc -l || echo "0")
          echo "📝 New TODO comments added: $NEW_TODOS"
          if [ "$NEW_TODOS" -gt 5 ]; then
            echo "⚠️ Warning: Many new TODOs added ($NEW_TODOS)"
            echo "Consider completing some before merging"
          fi

      - name: 📊 Code Statistics
        run: |
          echo "📊 Code Statistics:"
          echo "JavaScript files: $(find apps/user-app/js -name '*.js' ! -path '*/node_modules/*' 2>/dev/null | wc -l)"
          echo "TypeScript files: $(find . -name '*.ts' ! -path '*/node_modules/*' 2>/dev/null | wc -l)"
          echo "CSS files: $(find apps/user-app/css -name '*.css' 2>/dev/null | wc -l)"
          echo "Total lines of code: $(find . -name '*.js' -o -name '*.ts' -o -name '*.css' ! -path '*/node_modules/*' 2>/dev/null | xargs wc -l 2>/dev/null | tail -1 || echo 'N/A')"

  # ═════════════════════════════════════════════════════════════
  # JOB 3: TypeScript Validation
  # בדיקת TypeScript
  # ═════════════════════════════════════════════════════════════
  typescript:
    name: 📘 TypeScript Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout PR Code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🔍 TypeScript Type Check
        run: npm run type-check

      - name: 🏗️ Compile TypeScript
        run: npm run compile-ts

      # PR-META-6: Typecheck + build new TS code under functions/src-ts/.
      # Uses functions/src-ts/tsconfig.json which extends the root tsconfig
      # but emits to functions/lib/ (Node 20 CommonJS).
      - name: 📘 Typecheck functions/src-ts (PR-META-6)
        run: |
          if [ -d functions/src-ts ] && find functions/src-ts -name '*.ts' -not -path '*/node_modules/*' -print -quit | grep -q .; then
            echo "Installing functions/ dependencies..."
            cd functions && npm ci --prefer-offline --no-audit && cd ..
            echo "Typechecking functions/src-ts/..."
            cd functions && npm run typecheck:ts && cd ..
          else
            echo "⏭️  Skipped — no .ts files in functions/src-ts/ yet."
          fi

      - name: ✅ TypeScript Validation Passed
        run: echo "✅ All TypeScript files compiled successfully!"

  # ═════════════════════════════════════════════════════════════
  # JOB 4: Security Audit
  # בדיקות אבטחה
  # ═════════════════════════════════════════════════════════════
  security:
    name: 🔒 Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout PR Code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔒 NPM Security Audit (deferred to Phase 1.5)
        run: |
          echo "⏸️ npm audit deferred to Phase 1.5 (firebase 11→12 upgrade)."
          echo "Continuous coverage handled by Dependabot — see .github/dependabot.yml"

      # PR-CI-1: base ref via env: (see JOB 1).
      - name: 🔍 Scan for Exposed Secrets
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          echo "🔍 Scanning for exposed secrets in PR..."
          if git diff "origin/${PR_BASE_REF}...HEAD" | grep -i "password\|secret\|apikey.*:.*['\"]AIza" 2>/dev/null; then
            echo "⚠️ Warning: Potential secrets detected in PR diff"
            echo "Please review and remove before merging!"
          else
            echo "✅ No obvious secrets detected"
          fi

      - name: 📊 Upload Security Report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: security-report-pr-${{ github.event.pull_request.number }}
          path: security-report.json
          retention-days: 30

  # ═════════════════════════════════════════════════════════════
  # JOB 5: Automated Tests
  # הרצת בדיקות
  # ═════════════════════════════════════════════════════════════
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    # Bumped from 15 → 25 min in Pre-H.0.0.D (devils-advocate Attack #3):
    # firebase emulators:exec cold-boots a Java-based Firestore emulator
    # which adds ~15-30s before any rules test runs. 15-min ceiling was
    # cutting it close on flaky cold starts.
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout PR Code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # PR-Pre-H.0.0.D: Java runtime required for the Firestore Emulator
      # (devils-advocate Attack #4). Pin to a known-working JDK to avoid
      # silent breakage when ubuntu-latest image rolls newer JDK versions.
      - name: ☕ Setup Java (required by Firestore Emulator)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🔒 Verify Firestore Emulator binary is available
        run: npx firebase --version

      # PR-Pre-H.0.0.D: rules tests use `@firebase/rules-unit-testing` against
      # the local emulator. `emulators:exec` auto-manages boot/teardown. The
      # rules-test setup hard-fails if FIRESTORE_EMULATOR_HOST is not set —
      # so this step IS the only sanctioned entry point.
      - name: 🔐 Run Firestore Rules tests (emulator)
        run: npm run test:rules:emulator

      - name: 🧪 Run Vitest (root, non-rules)
        run: npm test

      - name: 📦 Install Functions dependencies
        working-directory: functions
        run: npm ci --prefer-offline --no-audit

      - name: 🧪 Run Jest (functions)
        working-directory: functions
        run: npm test

  # ═════════════════════════════════════════════════════════════
  # JOB 6: Build Verification
  # וידוא שהפרויקט נבנה בהצלחה
  # ═════════════════════════════════════════════════════════════
  build:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    needs: [code-quality, typescript, security]
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout PR Code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🏗️ Build TypeScript
        run: npm run compile-ts

      - name: ✅ Build Successful
        run: |
          echo "✅ Build completed successfully!"
          echo "This PR is ready for code review"

      - name: 📊 Build Artifacts Info
        run: |
          echo "📊 Build Output:"
          if [ -d "apps/user-app/dist" ]; then
            echo "Compiled files in dist/:"
            find apps/user-app/dist -type f | head -20
          else
            echo "No dist directory (expected for some configurations)"
          fi

  # ═════════════════════════════════════════════════════════════
  # JOB 7: Final Summary
  # סיכום תוצאות הבדיקות
  # ═════════════════════════════════════════════════════════════
  pr-summary:
    name: 📊 PR Validation Summary
    runs-on: ubuntu-latest
    needs: [pr-info, code-quality, typescript, security, test, build]
    if: always()
    timeout-minutes: 5

    steps:
      - name: ✅ All Checks Passed
        if: ${{ !contains(needs.*.result, 'failure') }}
        run: |
          echo "════════════════════════════════════════"
          echo "✅ Pull Request Validation: SUCCESS"
          echo "════════════════════════════════════════"
          echo "All checks passed successfully!"
          echo ""
          echo "✅ Code Quality: Passed"
          echo "✅ TypeScript: Passed"
          echo "✅ Security: Passed"
          echo "✅ Tests: Passed"
          echo "✅ Build: Passed"
          echo ""
          echo "🎉 This PR is ready to merge!"
          echo "════════════════════════════════════════"

      - name: ❌ Some Checks Failed
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |
          echo "════════════════════════════════════════"
          echo "❌ Pull Request Validation: FAILED"
          echo "════════════════════════════════════════"
          echo "Some checks did not pass."
          echo ""
          echo "Code Quality: ${{ needs.code-quality.result }}"
          echo "TypeScript: ${{ needs.typescript.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo ""
          echo "⚠️ Please fix the failing checks before merging"
          echo "════════════════════════════════════════"
          exit 1

      - name: 📧 PR Status Comment
        run: |
          echo "💡 Tip: In the future, this can post a comment to the PR"
          echo "with detailed results using GitHub API or actions/github-script"
